<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">Custom portrait-style hero art for Jatsen</title>
  <desc id="desc">Abstract professional portrait illustration with warm neutral and orange accents.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe8"/>
      <stop offset="100%" stop-color="#efe3d7"/>
    </linearGradient>
    <linearGradient id="jacketGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#233463"/>
      <stop offset="100%" stop-color="#121c39"/>
    </linearGradient>
    <linearGradient id="tieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7cd6"/>
      <stop offset="100%" stop-color="#1f4f8f"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="900" height="1200" fill="url(#bgGrad)"/>

  <circle cx="710" cy="245" r="125" fill="#ff6a00" fill-opacity="0.16"/>
  <circle cx="190" cy="300" r="72" fill="#ff6a00" fill-opacity="0.1"/>
  <circle cx="150" cy="930" r="54" fill="#202020" fill-opacity="0.06"/>

  <g filter="url(#softShadow)">
    <ellipse cx="450" cy="1090" rx="230" ry="38" fill="#000" fill-opacity="0.17"/>

    <path d="M300 560 C320 475 390 430 450 430 C510 430 580 475 600 560 L650 1010 C580 1065 515 1088 450 1088 C385 1088 320 1065 250 1010 Z" fill="url(#jacketGrad)"/>

    <path d="M420 560 L450 530 L480 560 L466 810 L434 810 Z" fill="url(#tieGrad)"/>
    <path d="M390 560 L450 500 L510 560 Z" fill="#f2f4f9"/>

    <rect x="350" y="515" width="200" height="30" rx="15" fill="#f6d1bb"/>
    <ellipse cx="450" cy="395" rx="112" ry="128" fill="#f3c9aa"/>

    <path d="M334 378 C338 302 386 256 452 256 C518 256 568 302 572 378 C536 338 504 324 452 324 C400 324 368 338 334 378 Z" fill="#1f1f1f"/>
    <rect x="375" y="420" width="150" height="28" rx="14" fill="#e5b596"/>

    <path d="M270 590 C228 640 212 718 222 790 C256 780 282 760 294 722 Z" fill="#1b274b"/>
    <path d="M630 590 C672 640 688 718 678 790 C644 780 618 760 606 722 Z" fill="#1b274b"/>

    <rect x="420" y="870" width="60" height="120" rx="28" fill="#172547"/>
  </g>

  <g opacity="0.22" fill="#ff6a00">
    <rect x="78" y="108" width="74" height="4" rx="2"/>
    <rect x="78" y="124" width="48" height="4" rx="2"/>
    <rect x="78" y="140" width="62" height="4" rx="2"/>
  </g>
</svg>
